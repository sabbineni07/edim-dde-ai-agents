<div class="page-header mb-4">
  <h2 class="mb-0"><i class="bi bi-robot me-2"></i>AI Agents</h2>
  <p class="text-muted small mb-0 mt-1">What each agent does and how to use it.</p>
</div>

<div class="row g-4">
  <div class="col-md-6" *ngFor="let a of agents">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title"><i class="bi me-2" [ngClass]="a.icon"></i>{{ a.name }}</h5>
        <p class="card-text text-muted small">{{ a.description }}</p>
        <p class="card-text small"><strong>How to use:</strong> {{ a.howToUse }}</p>
        <a [routerLink]="a.getStartedRoute" class="btn btn-primary btn-sm">Get started</a>
      </div>
    </div>
  </div>
</div>
