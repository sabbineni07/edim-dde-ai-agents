<div class="login-container">
  <div class="login-card card shadow">
    <div class="card-body p-4">
      <div class="login-header text-center mb-4">
        <i class="bi bi-cpu display-4 text-primary"></i>
        <h2 class="mt-2">Cluster Advisor</h2>
        <p class="text-muted">Sign in to continue</p>
      </div>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" formControlName="username" [class.is-invalid]="submitted && f['username'].errors" placeholder="Username" />
          <div class="invalid-feedback" *ngIf="submitted && f['username'].errors?.['required']">Required</div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" formControlName="password" [class.is-invalid]="submitted && f['password'].errors" placeholder="Password" />
          <div class="invalid-feedback" *ngIf="submitted && f['password'].errors?.['required']">Required</div>
          <div class="invalid-feedback" *ngIf="submitted && f['password'].errors?.['minlength']">At least 4 characters</div>
        </div>
        <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            <span *ngIf="!loading">Sign In</span>
            <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-1"></span>Signing in...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
