<div class="page-header mb-4">
  <h2 class="mb-0"><i class="bi bi-chat-dots me-2"></i>Chat</h2>
  <p class="text-muted small mb-0 mt-1">Ask questions about your job cost and cluster metrics. Optionally scope by workspace and job below.</p>
</div>

<div class="row mb-3">
  <div class="col-md-4">
    <label class="form-label small">Workspace ID (optional)</label>
    <input type="text" class="form-control form-control-sm" [(ngModel)]="workspaceId" placeholder="e.g. 123456" />
  </div>
  <div class="col-md-4">
    <label class="form-label small">Job ID (optional)</label>
    <input type="text" class="form-control form-control-sm" [(ngModel)]="jobId" placeholder="e.g. 789" />
  </div>
</div>

<div class="alert alert-danger" *ngIf="error">{{ error }}</div>

<div class="card chat-card">
  <div class="card-body d-flex flex-column" style="min-height: 400px;">
    <div class="flex-grow-1 overflow-auto mb-3">
      <div *ngFor="let m of messages" class="mb-3" [class.text-end]="m.role === 'user'">
        <span class="badge" [class.bg-primary]="m.role === 'user'" [class.bg-secondary]="m.role === 'assistant'">{{ m.role }}</span>
        <div class="mt-1" [class.bg-light]="m.role === 'assistant'" [class.p-2]="m.role === 'assistant'" [class.rounded]="m.role === 'assistant'">
          {{ m.content }}
        </div>
        <div class="small text-muted mt-1" *ngIf="m.context && m.role === 'assistant'">Context: {{ m.context['job_count'] ?? 0 }} jobs</div>
      </div>
      <div *ngIf="loading" class="text-muted"><span class="spinner-border spinner-border-sm me-1"></span>Thinking...</div>
    </div>
    <div class="d-flex gap-2">
      <input type="text" class="form-control" [(ngModel)]="question" placeholder="Ask a question..." (keydown.enter)="send()" />
      <button class="btn btn-primary" (click)="send()" [disabled]="loading || !(question || '').trim()">Send</button>
    </div>
  </div>
</div>
